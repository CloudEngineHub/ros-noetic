ros_distro: noetic

# mapping for package keys
conda_index:
  - robostack.yaml
  - packages-ignore.yaml

# Reminder for next full rebuild, the next build number should be 25
build_number: 24

mutex_package:
  name: "ros-distro-mutex"
  version: "0.7.0"
  upper_bound: "x.x"
  run_constraints:
    - libboost 1.88.*
    - libboost-devel 1.88.*
    - pcl 1.15.1.*
    - gazebo 11.*
    - libprotobuf 6.33.5.*
    - libxml2 2.14.*
    - ogre 1.10.12.*
    - libopencv * qt6*
    - krb5 1.21.*


packages_skip_by_deps:
  - openni2-camera
  - if: not linux
    then:
      - pendulum_control
      - rttest
      - tlsf
      - tlsf_cpp
      - euslisp
      - jskeus
      - roseus
      - usb-cam
      - openni2-launch
  - if: win
    then:
      - stage
      - stage-ros

packages_remove_from_deps:
  - libpointmatcher
  - openni2-camera
  - if: not linux
    then:
      - pendulum_control
      - rttest
      - tlsf
      - tlsf_cpp
      - euslisp
      - jskeus
      - roseus
      - usb-cam
      - openni2-launch
  - if: win
    then:
      - stage
      - stage-ros

skip_existing:
  # - output
  - https://conda.anaconda.org/robostack-staging/

