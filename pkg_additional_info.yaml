octomap:
  generate_dummy_package_with_run_deps:
    dep_name: octomap
    max_pin: 'x.x'
    override_version: '1.10.0'
draco:
  generate_dummy_package_with_run_deps:
    dep_name: draco
    max_pin: 'x.x.x'
    override_version: '1.5.7'
ompl:
  generate_dummy_package_with_run_deps:
    dep_name: ompl
    max_pin: 'x.x'
    override_version: '1.7.0'
# Do not unvendor urdfdom_py as the ROS1 required version is not on conda-forge
# urdfdom_py:
#   generate_dummy_package_with_run_deps:
#     dep_name: urdfdom-py
#     max_pin: 'x.x'
urdfdom_headers:
  generate_dummy_package_with_run_deps:
    dep_name: urdfdom_headers
    max_pin: 'x.x'
cartographer:
  generate_dummy_package_with_run_deps:
    dep_name: cartographer
    max_pin: 'x.x'
    # ROS uses a custom versioning scheme currently at 2.0.9004
    override_version: '2.0.0'
hpp_fcl:
  generate_dummy_package_with_run_deps:
    dep_name: hpp-fcl
    max_pin: 'x.x.x'
    # the version on ros is outdated w.r.t. to the conda-forge one
    override_version: '3.0.2'
fcl:
  generate_dummy_package_with_run_deps:
    dep_name: fcl
    max_pin: 'x.x'
    # the version on ros is outdated w.r.t. to the conda-forge one
    override_version: '0.7.0'
coal:
  generate_dummy_package_with_run_deps:
    dep_name: coal
    max_pin: 'x.x.x'
eigenpy:
  generate_dummy_package_with_run_deps:
    dep_name: eigenpy
    max_pin: 'x.x.x'
    # the version in ros is not compatible with conda-forge's coal and hpp_fcl builds
    override_version: '3.12.0'
pinocchio:
  generate_dummy_package_with_run_deps:
    dep_name: pinocchio
    max_pin: 'x.x.x'
    # the version on ros is outdated w.r.t. to the conda-forge one
    override_version: '3.9.0'
gtsam:
  generate_dummy_package_with_run_deps:
    dep_name: gtsam
    max_pin: 'x.x'
librealsense2:
  generate_dummy_package_with_run_deps:
    dep_name: librealsense
    max_pin: 'x.x'
    override_version: '2.56.5'

apriltag:
  additional_cmake_args: "-DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON"
apriltag_ros:
  additional_cmake_args: "-DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON"
